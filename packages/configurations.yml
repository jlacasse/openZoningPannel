    turn_off_action:
      - lambda: id(open_zoning_ctrl).set_zone_enabled(3, false);

  - platform: template
    name: "Geo_zone_5_enabled"
    id: geo_zone_5_enabled
    icon: "mdi:hvac"
    entity_category: config
    optimistic: true
    restore_mode: RESTORE_DEFAULT_ON
